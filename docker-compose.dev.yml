x-common: &common
  env_file: .env
  restart: unless-stopped

services:
  redis:
    <<: *common
    image: redis:7-alpine
    expose:
      - "6379"

  api:
    <<: *common
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    command: uvicorn src.webapp.api:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./configs:/app/configs
      - ./checkpoints:/app/checkpoints:ro
      - ./outputs:/app/outputs
    depends_on:
      - redis
    environment:
      DEVICE: cpu

  worker:
    <<: *common
    profiles: ["gpu"]
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    volumes:
      - ./src:/app/src
      - ./configs:/app/configs
      - ./checkpoints:/app/checkpoints:ro
      - ./outputs:/app/outputs
    depends_on:
      - redis
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  frontend:
    <<: *common
    image: node:20-alpine
    working_dir: /app
    command: sh -c "[ -d node_modules ] || npm ci && npm run dev"
    ports:
      - "3000:3000"
    volumes:
      - ./webapp:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_PROXY_TARGET: http://api:8000
    depends_on:
      - api
