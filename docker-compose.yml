version: "3.9"

x-common: &common
  env_file: .env
  restart: unless-stopped

services:
  redis:
    <<: *common
    image: redis:7-alpine
    expose:
      - "6379"

  api:
    <<: *common
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./checkpoints:/app/checkpoints:ro
      - ./outputs:/app/outputs
    depends_on:
      - redis
    environment:
      DEVICE: cpu   # API is CPU-only; GPU work runs in worker

  worker:
    <<: *common
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    volumes:
      - ./checkpoints:/app/checkpoints:ro
      - ./outputs:/app/outputs
    depends_on:
      - redis
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  frontend:
    <<: *common
    build:
      context: webapp
      dockerfile: ../docker/frontend.Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api
