# @package _global_
experiment_name: webapp

webapp:
  primary_checkpoint: checkpoints/hybrid_best.ckpt
  candidate_threshold: 0.5
  fp_checkpoint: checkpoints/fp_reduction_best.ckpt
  min_candidate_voxels: 10
  primary_patch_size: 256
  fp_threshold: 0.5          # updated after val tuning
  # Lung window for slice rendering
  window_level: -600
  window_width: 1500
  # Candidate box colours
  confident_color: [0, 200, 255]  # orange-yellow in OpenCV BGR, >= fp_threshold
  uncertain_color: [0, 165, 255]  # amber in OpenCV BGR, < fp_threshold
