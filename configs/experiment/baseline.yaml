# @package _global_
experiment_name: baseline

model:
  name: unet3d
  in_ch: 1
  base_ch: 32

data:
  patch_size: 128
  batch_size: 2
  num_workers: 4
  train_folds: [0, 1, 2, 3, 4, 5, 6, 7]
  val_folds: [8]
  test_folds: [9]
  augment: true

loss:
  name: dice_bce
  dice_weight: 0.5
  bce_weight: 0.5

trainer:
  max_epochs: 100
  lr: 1.0e-4
  weight_decay: 1.0e-5
  lr_scheduler: cosine
  grad_clip: 1.0
  device: ${oc.env:DEVICE,cuda}
  log_every_n_steps: 10
  val_every_n_epochs: 1
  save_top_k: 3
  monitor_metric: val_cpm
